phases:
  - id: mvp
    name: MVP
    description: Минимально жизнеспособный продукт
    order: 1
tasks:
  - id: task-001
    phase: mvp
    title: Визуальная заглушка главной страницы
    description: >-
      Создать главную страницу приложения со статическими данными-заглушками.

      Цель: дать пользователю первый визуальный результат как можно быстрее.

      Реализовать только то, что пользователь увидит сразу при открытии
      приложения. Остальные страницы приложения реализовывать не нужно.
    priority: high
    acceptance_criteria:
      - Главная страница отображается без ошибок
      - Данные отображаются из статических заглушек
    depends_on: []
    related_feature: Холодильник
    status: completed
    summary: >-
      Реализована главная страница со статическими данными-заглушками.
      Страница показывает 4 раздела: Холодильник (6 продуктов), Список покупок
      (5 позиций), Мои блюда и категории (3 категории, 4 блюда) и Что
      приготовить? (4 подсказки). Данные находятся в lib/data.ts, страница — в
      app/page.tsx.
  - id: task-002
    phase: mvp
    title: Управление продуктами в холодильнике
    description: "Реализовать полноценный CRUD для продуктов в холодильнике:
      добавление продукта с названием и количеством, удаление, отметка
      «закончился». Данные сохраняются в базе."
    priority: high
    acceptance_criteria:
      - Пользователь может добавить продукт с названием и количеством
      - Пользователь может удалить продукт из холодильника
      - Пользователь может отметить продукт как закончившийся
      - Список продуктов отображается актуальным и сохраняется между сессиями
    depends_on:
      - task-001
    related_feature: Холодильник
    status: completed
    summary: >-
      Реализован полноценный CRUD для продуктов холодильника: добавление с
      названием и количеством, удаление, отметка «закончился». Данные
      сохраняются в DynamoDB (таблица products). Модели и функции — в
      lib/models.ts, API-роуты (GET/POST/PATCH/DELETE) — в
      app/api/products/route.ts, клиентский компонент — в
      components/fridge-manager.tsx.
  - id: task-003
    phase: mvp
    title: Список покупок
    description: "Реализовать список покупок: добавление продуктов, отметка
      купленного (перенос обратно в холодильник), удаление. Закончившиеся
      продукты из холодильника автоматически добавляются в список покупок."
    priority: high
    acceptance_criteria:
      - Пользователь может добавить продукт в список покупок
      - Пользователь может отметить продукт как купленный — он переносится
        обратно в холодильник
      - Пользователь может удалить позицию из списка
      - При отметке продукта как закончившегося в холодильнике, он автоматически
        появляется в списке покупок
    depends_on:
      - task-002
    related_feature: Список покупок
    status: completed
    summary: >-
      Реализован список покупок: добавление продукта (POST /api/shopping),
      отметка купленного с переносом в холодильник (PATCH /api/shopping?isBought=true
      создаёт/обновляет продукт в холодильнике), удаление (DELETE /api/shopping).
      При отметке продукта как закончившегося (PATCH /api/products?isFinished=true)
      он автоматически добавляется в список покупок. Таблица shopping_items в
      DynamoDB, миграция выполнена. Основные файлы: components/shopping-list-manager.tsx,
      app/api/shopping/route.ts, lib/models.ts (ShoppingItem), lib/mock-data.ts.
  - id: task-004
    phase: mvp
    title: Мои блюда и категории
    description: >-
      Реализовать управление категориями блюд и самими блюдами. Пользователь
      может создавать категории (Завтраки, Супы и т.д.), добавлять в них блюда с
      названием и списком продуктов. Редактирование и удаление категорий и
      блюд.
    priority: high
    acceptance_criteria:
      - Пользователь может создать категорию блюд
      - Пользователь может добавить блюдо в категорию с названием и списком
        продуктов
      - Пользователь может редактировать и удалять блюда и категории
      - Категории и блюда отображаются в удобном виде
    depends_on:
      - task-001
    related_feature: Мои блюда и категории
    status: completed
    summary: >-
      Реализован полноценный CRUD для категорий блюд и блюд: создание
      категории, добавление блюда с названием и списком продуктов,
      редактирование и удаление. Данные сохраняются в DynamoDB (таблицы
      categories, dishes). API-роуты — app/api/categories/route.ts и
      app/api/dishes/route.ts. Модели и функции — lib/models.ts.
      Клиентский компонент — components/recipe-manager.tsx. Миграция
      выполнена.
  - id: task-005
    phase: mvp
    title: Что приготовить? — подсказка по продуктам
    description:
      "Реализовать страницу, которая анализирует продукты в холодильнике
      и список блюд, и показывает: какие блюда можно приготовить из имеющихся
      продуктов, а какие — с добавлением 1-2 недостающих (с указанием, чего не
      хватает)."
    priority: medium
    acceptance_criteria:
      - Приложение показывает блюда, которые можно приготовить из имеющихся
        продуктов
      - Приложение показывает блюда, для которых не хватает 1-2 продуктов
      - Пользователь видит, каких именно продуктов не хватает
    depends_on:
      - task-002
      - task-004
    related_feature: Что приготовить?
    status: completed
    summary: >-
      Реализована подсказка по продуктам: страница анализирует продукты в
      холодильнике и список блюд, показывая две группы — «Можно приготовить»
      (все ингредиенты в наличии) и «Добавьте 1-2 продукта» (с указанием
      недостающих). Алгоритм сопоставления — computeSuggestions() в
      lib/models.ts, API — GET /api/suggestions, клиентский компонент —
      components/recipe-suggestions.tsx. Главная страница app/page.tsx
      отображает блок «Что приготовить?» с актуальными подсказками.
